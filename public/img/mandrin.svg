<svg viewBox="0 0 300 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="metalPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a6f9e"/>
      <stop offset="15%" stop-color="#c3b9e0"/>
      <stop offset="35%" stop-color="#e6dff5"/>
      <stop offset="50%" stop-color="#a396c9"/>
      <stop offset="65%" stop-color="#e6dff5"/>
      <stop offset="85%" stop-color="#c3b9e0"/>
      <stop offset="100%" stop-color="#7a6f9e"/>
    </linearGradient>
    <linearGradient id="pocketShade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5f5480"/>
      <stop offset="50%" stop-color="#8f82b8"/>
      <stop offset="100%" stop-color="#5f5480"/>
    </linearGradient>
  </defs>

  <g stroke="#333" stroke-width="1">
    <!-- Top pin thread connection -->
    <rect x="104" y="30" width="32" height="50" fill="url(#metalPurple)"/>
    <g stroke="#5f5480" stroke-width="1">
      <line x1="104" y1="36" x2="136" y2="36"/><line x1="104" y1="41" x2="136" y2="41"/>
      <line x1="104" y1="46" x2="136" y2="46"/><line x1="104" y1="51" x2="136" y2="51"/>
      <line x1="104" y1="56" x2="136" y2="56"/><line x1="104" y1="61" x2="136" y2="61"/>
      <line x1="104" y1="66" x2="136" y2="66"/><line x1="104" y1="71" x2="136" y2="71"/>
    </g>

    <!-- Upper collar -->
    <rect x="94" y="80" width="52" height="25" fill="url(#metalPurple)"/>

    <!-- Main mandrel body (upper straight section) -->
    <rect x="100" y="105" width="40" height="70" fill="url(#metalPurple)"/>

    <!-- Widened offset body housing the side pocket -->
    <path d="M100,175 
             L100,340 
             L140,340 
             L140,175 
             L182,175 
             C192,175 198,182 198,192 
             L198,300 
             C198,312 190,320 178,320 
             L140,320 
             L140,175 Z" 
          fill="url(#metalPurple)"/>

    <!-- Side pocket cavity outline -->
    <rect x="150" y="195" width="38" height="105" rx="10" fill="url(#pocketShade)"/>

    <!-- Gas-lift valve inside pocket -->
    <rect x="157" y="205" width="24" height="85" rx="8" fill="#e6dff5" stroke="#5f5480" stroke-width="1.5"/>
    <circle cx="169" cy="222" r="5" fill="#a396c9" stroke="#5f5480"/>
    <line x1="169" y1="235" x2="169" y2="280" stroke="#5f5480" stroke-width="2"/>
    <circle cx="169" cy="285" r="4" fill="#a396c9" stroke="#5f5480"/>

    <!-- Port from tubing bore into pocket (kickover port) -->
    <rect x="138" y="240" width="14" height="10" fill="#5f5480"/>

    <!-- Lower collar -->
    <rect x="94" y="340" width="52" height="25" fill="url(#metalPurple)"/>

    <!-- Bottom pin thread connection -->
    <rect x="104" y="365" width="32" height="50" fill="url(#metalPurple)"/>
    <g stroke="#5f5480" stroke-width="1">
      <line x1="104" y1="371" x2="136" y2="371"/><line x1="104" y1="376" x2="136" y2="376"/>
      <line x1="104" y1="381" x2="136" y2="381"/><line x1="104" y1="386" x2="136" y2="386"/>
      <line x1="104" y1="391" x2="136" y2="391"/><line x1="104" y1="396" x2="136" y2="396"/>
      <line x1="104" y1="401" x2="136" y2="401"/><line x1="104" y1="406" x2="136" y2="406"/>
    </g>
  </g>
</svg>
