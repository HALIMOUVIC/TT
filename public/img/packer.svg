<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 750" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="metalBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a8ea3"/><stop offset="50%" stop-color="#e6edf3"/><stop offset="100%" stop-color="#7a8ea3"/>
    </linearGradient>
    <linearGradient id="rubberDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a2a2a"/><stop offset="50%" stop-color="#484848"/><stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>

  <g stroke="#333" stroke-width="1">
    
    <!-- المجموعة العلوية -->
    <g id="upper-assembly" transform="translate(0, -50)">
      <rect x="98" y="65" width="44" height="80" fill="url(#metalBlue)"/>
      <rect x="92" y="125" width="56" height="45" fill="url(#metalBlue)"/>
      <polygon points="10,170 230,170 230,220 10,220" fill="url(#metalBlue)"/>
      <polygon points="10,220 230,220 230,240 10,240" fill="#5c6b78"/>
      <rect x="30" y="240" width="180" height="50" fill="url(#metalBlue)"/>
    </g>

    <!-- الأشرطة السوداء: كل شريط في مجموعة خاصة -->
    <!-- القاعدة: y الشريط التالي = (y الشريط السابق + height الشريط السابق + الفراغ) -->
    <g id="band-1"><rect x="-10" y="245" width="260" height="100" rx="4" fill="url(#rubberDark)"/></g>
    <g id="band-2"><rect x="-10" y="350" width="260" height="100" rx="4" fill="url(#rubberDark)"/></g>
    <g id="band-3"><rect x="-10" y="455" width="260" height="90" rx="4" fill="url(#rubberDark)"/></g>

    <!-- المجموعة السفلية -->
    <g id="lower-assembly" transform="translate(0, 50)">
      <rect x="30" y="500" width="180" height="50" fill="url(#metalBlue)"/>
      <polygon points="10,550 230,550 230,575 10,575" fill="#5c6b78"/>
      <polygon points="10,575 230,575 230,595 10,595" fill="url(#metalBlue)"/>
      <rect x="96" y="595" width="48" height="50" fill="url(#metalBlue)"/>
      <rect x="100" y="645" width="40" height="50" fill="url(#metalBlue)"/>
    </g>
    
  </g>
</svg>