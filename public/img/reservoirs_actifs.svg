<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="45%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>

    <linearGradient id="poolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>

    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1.4" stdDeviation="1.5" flood-color="#9a3412" flood-opacity="0.32"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">

    <!-- ground surface line -->
    <line x1="4" y1="16" x2="60" y2="16" stroke="url(#iconGrad)" stroke-width="2.6" stroke-linecap="round"/>

    <!-- small wellhead at surface -->
    <rect x="27.5" y="9.5" width="9" height="6.2" rx="2" fill="url(#iconGrad)"/>
    <circle cx="32" cy="7.5" r="2.2" fill="url(#iconGrad)"/>

    <!-- well pipe descending to the reservoir -->
    <rect x="29.7" y="15.8" width="4.6" height="18" fill="url(#iconGrad)"/>

    <!-- underground reservoir pocket (rock dome shape) -->
    <path d="M12 40
             C12 30 20 24 32 24
             C44 24 52 30 52 40
             C52 49 44 54 32 54
             C20 54 12 49 12 40 Z"
          fill="url(#poolGrad)" opacity="0.28"/>

    <!-- active fluid pooled inside the reservoir, lower portion filled -->
    <path d="M14.5 41
             C14.5 48.5 22.3 52.5 32 52.5
             C41.7 52.5 49.5 48.5 49.5 41
             C49.5 41 49.5 43.5 32 43.5
             C14.5 43.5 14.5 41 14.5 41 Z"
          fill="url(#poolGrad)"/>

    <!-- subtle wavy surface line on the fluid, suggesting active movement -->
    <path d="M17 42.3 C 21 44 27 40.7 32 42.3 C 37 44 43 40.7 47 42.3"
          stroke="#fff7ed" stroke-opacity="0.6" stroke-width="1.4" stroke-linecap="round" fill="none"/>

    <!-- reservoir outline -->
    <path d="M12 40
             C12 30 20 24 32 24
             C44 24 52 30 52 40
             C52 49 44 54 32 54
             C20 54 12 49 12 40 Z"
          fill="none" stroke="url(#iconGrad)" stroke-width="2"/>

    <!-- active pulse signal top-right -->
    <circle cx="49" cy="12" r="3" fill="url(#iconGrad)"/>
    <circle cx="49" cy="12" r="6.4" fill="none" stroke="url(#iconGrad)" stroke-width="1.8" opacity="0.55"/>
    <circle cx="49" cy="12" r="9.8" fill="none" stroke="url(#iconGrad)" stroke-width="1.4" opacity="0.3"/>
  </g>
</svg>
